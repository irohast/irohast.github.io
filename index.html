<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<title>라프의 놀이터</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    background:#0f1115;
    color:#eee7c9;
    font-family:pretendard, sans-serif;
}

.wrapper{
    width:900px;
    margin:40px auto;
    display:flex;
    gap:40px;
}

.card{
    background:#1a1d22;
    padding:25px;
    border-radius:18px;
    box-shadow:0 0 25px rgba(0,0,0,.6);
}

.title{
    text-align:center;
    font-size:34px;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#ffd84d;
    margin-bottom:20px;
}

.input-row{
    display:flex;
    gap:14px;
    margin-top:18px;
}

.stat-box{
    display:flex;
    flex-direction:column;
    width:90px;
}

.stat-box label{
    margin-bottom:6px;
    font-size:14px;
}

.stat-box input{
    background:#0e0f13;
    border:1px solid #7c6f4a;
    border-radius:6px;
    color:#fff;
    padding:6px;
    text-align:center;
}

select{
    width:100%;
    padding:8px;
    background:#0e0f13;
    border:1px solid #7c6f4a;
    color:#fff;
    border-radius:6px;
}

button{
    margin-top:18px;
    width:100%;
    padding:14px;
    border:none;
    background:#6c6450;
    color:#fff;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
}

.result-panel{
    display:flex;
    align-items:center;
    justify-content:center;
    width:260px;
}

#excellentRate{
    font-size:48px;
    color:#9dff9a;
    text-align:center;
}

.list-box{
    margin-top:25px;
    max-height:260px;
    overflow-y:auto;
}

.list-item{
    display:grid;
    grid-template-columns:60px 60px repeat(4,1fr);
    padding:6px 4px;
    border-bottom:1px solid #333;
    font-size:14px;
}
</style>

</head>

<body>

<h1 class="title">별과바다 해피 계산기</h1>
<div class="subtitle">★ 별과바다 부족 ★</div>

<div class="wrapper">

```
<div class="card" style="width:520px">

    <label>펫 이름</label>
    <select id="petSelect"></select>

    <div class="input-row">
        <div class="stat-box">
            <label>내구</label>
            <input id="stat_hp" type="number" step="0.01">
        </div>
        <div class="stat-box">
            <label>공격</label>
            <input id="stat_atk" type="number" step="0.01">
        </div>
        <div class="stat-box">
            <label>방어</label>
            <input id="stat_def" type="number" step="0.01">
        </div>
        <div class="stat-box">
            <label>순발</label>
            <input id="stat_spd" type="number" step="0.01">
        </div>
    </div>

    <button id="calcBtn">결과 계산하기</button>

    <div class="list-box" id="resultList"></div>

</div>

<div class="card result-panel">
    <div>
        <div style="text-align:center;margin-bottom:10px">우수확률</div>
        <div id="excellentRate">--%</div>
    </div>
</div>
```

</div>

<script src="pet.js"></script>

</body>
</html>
