<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8">
<title>별과바다 부족 - 펫 계산기</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

<style>
body{
    background:linear-gradient(90deg,#0f1d1b,#142b28,#0f1d1b);
    font-family:'Malgun Gothic';
    color:#e6fff2;
}

/* 좌측 카드 */
.container{
    max-width:420px;
    margin-left:60px;
    margin-top:40px;
}

.title{
    text-align:center;
    margin:20px 0;
}

.card{
    background:#1b1f1d;
    border-radius:18px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
    padding:20px;
    position:relative;
}

/* 입력 + 확률 가로배치 */
.stat-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}
.stat-row input{
    width:55%;
}

/* 확률 패널 */
#probabilityPanel{
    position:absolute;
    left:460px;
    top:240px;
    width:260px;
    text-align:center;
}
.prob-title{
    font-size:24px;
}
#probValue{
    font-size:42px;
    color:#27d36b;
    font-weight:bold;
}

/* 결과표 숨김 (엔진은 사용하지만 UI는 안씀) */
#myPet, #result-master-container{
    display:none !important;
}

/* 버튼 */
.btn-main{
    background:#5f5a50;
    border:none;
    height:50px;
    font-size:18px;
}
.btn-main:hover{
    background:#7a7468;
}

/* 자동완성 */
#pet-suggestions{
    list-style:none;
    padding:0;
    margin-top:5px;
    border:1px solid #444;
    border-radius:8px;
    max-height:260px;
    overflow-y:auto;
    display:none;
    background:#1f2522;
    position:relative;
    z-index:999;
}
#pet-suggestions li{
    padding:8px;
}
#pet-suggestions li:hover{
    background:#2d3a34;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="title">
<h2>Happy Pet Calculator</h2>
<small>⭐별과바다 부족⭐</small>
</div>

<div class="card">

<label>페트 이름</label>

<div class="input-group">

<input type="text" class="form-control" id="name" autocomplete="off">

<span class="input-group-btn">
<button class="btn btn-info" id="search">검색</button>
<button class="btn btn-default" id="showAll">▼</button>
</span>

</div>

<ul id="pet-suggestions"></ul>

<hr>

<div class="stat-row">
<div>
<label>내구</label>
<input type="number" id="hp" class="form-control">
</div>

<div>
<label>공격</label>
<input type="number" id="atk" class="form-control">
</div>

<div>
<label>방어</label>
<input type="number" id="def" class="form-control">
</div>

<div>
<label>순발</label>
<input type="number" id="agi" class="form-control">
</div>
</div>

<br>
<button id="calculate" class="btn btn-main btn-block">결과 계산하기</button>

</div>
</div>

<!-- 확률 -->

<div id="probabilityPanel">
<div class="prob-title">우수확률은 ?</div>
<div id="probValue">--%</div>
</div>

<script>
var pet = [];
let btnName = "";
const result = [];

function loadPetData() {
    return $.getJSON('./pets.json?v=' + new Date().getTime())
        .done(function(data) { 
            pet = data;
            pet.sort((a,b)=>a.name.localeCompare(b.name,'ko'));
        });
}

function showSuggestions(inputVal) {
    inputVal = inputVal.toLowerCase();
    let matches = inputVal ? pet.filter(p => p.name.toLowerCase().includes(inputVal)) : [];
    let $ul = $('#pet-suggestions');
    $ul.empty();

    matches.slice(0,15).forEach(p=>{
        $ul.append('<li>'+p.name+'</li>');
    });

    matches.length ? $ul.show() : $ul.hide();
}

function showAllPets(){
    let $ul = $('#pet-suggestions');
    $ul.empty();
    pet.forEach(p=>{
        $ul.append('<li>'+p.name+'</li>');
    });
    $ul.show();
}

$(document).ready(function() {

    loadPetData();

    $("#name").on("input", function(){
        showSuggestions($(this).val());
    });

    $("#showAll").on("click", function(){
        showAllPets();
    });

    $(document).on("mousedown", "#pet-suggestions li", function(){
        $("#name").val($(this).text());
        $("#pet-suggestions").hide();
        $("#search").click();
    });

    $(document).click(function(e){
        if(!$(e.target).closest('#name, #pet-suggestions, #showAll').length){
            $('#pet-suggestions').hide();
        }
    });

    $("#search, #calculate").on("click", function() {
        if (pet.length === 0) return;

        const foundPet = pet.find(p => p.name === $("#name").val());
        if (!foundPet) { alert("페트 정보를 찾을 수 없습니다."); return; }

        btnName = this.id;

        const copiedPet = JSON.parse(JSON.stringify(foundPet));
        setSRank(copiedPet);
        setBase(foundPet);
    });
});
</script>

<script src="pet.js"></script>

</body>
</html>
