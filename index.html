<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>별과바다 부족 펫 계산기</title>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<script src="pet.js"></script>

<style>

body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(180deg,#dbeafe,#bfdbfe);
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    padding:40px 10px;
}

.wrapper{
    width:1100px;
    max-width:96%;
    background:#344766;
    border-radius:26px;
    padding:30px;
    box-shadow:0 20px 45px rgba(0,0,0,0.25);
    color:white;
}

.title{
    text-align:center;
    font-size:34px;
    font-weight:800;
}

.creator{
    text-align:center;
    color:#ff8fa3;
    margin-bottom:25px;
    font-weight:700;
}

/* 좌우 분할 */
.main{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

/* 공통 */
.card{
    background:#2b3d59;
    padding:20px;
    border-radius:18px;
}

/* 검색 */
.searchbox{
    display:flex;
    margin-bottom:15px;
    position:relative;
}

.searchbox input{
    flex:1;
    height:44px;
    border:none;
    border-radius:12px 0 0 12px;
    padding-left:10px;
    font-size:16px;
}

.searchbox button{
    width:90px;
    border:none;
    background:#55b6e6;
    color:#00314d;
    font-weight:bold;
    border-radius:0 12px 12px 0;
    cursor:pointer;
}

/* 자동완성 */
#suggest{
    position:absolute;
    top:44px;
    width:100%;
    background:white;
    color:black;
    border-radius:0 0 12px 12px;
    display:none;
    z-index:10;
}
#suggest div{padding:8px;cursor:pointer;}
#suggest div:hover{background:#eee;}

/* 스탯 입력 */
.stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.stat label{
    font-size:14px;
}

.stat input{
    width:100%;
    height:40px;
    border-radius:10px;
    border:none;
    padding-left:10px;
    font-size:15px;
}

/* 버튼 */
.calcbtn{
    width:100%;
    height:48px;
    margin-top:18px;
    border:none;
    border-radius:14px;
    background:#4fc3ff;
    font-size:17px;
    font-weight:bold;
    color:#00213f;
    cursor:pointer;
}

/* 결과표 */
table{
    width:100%;
    background:white;
    color:black;
    margin-top:15px;
    border-radius:12px;
    overflow:hidden;
}
th{background:#5bb7e2;}
th,td{padding:7px;text-align:center;}

#sbox{
    background:#f1f1f1;
    color:black;
    margin-top:15px;
    padding:12px;
    border-radius:12px;
    display:none;
}

/* 감정기 */
.predict input{
    width:100%;
    height:38px;
    border-radius:10px;
    border:none;
    padding-left:8px;
    margin-bottom:8px;
}

.predictResult{
    margin-top:15px;
    background:#1f2f49;
    padding:15px;
    border-radius:14px;
    line-height:1.7;
    font-size:15px;
}

.good{color:#4cff9a;font-weight:bold;}
.bad{color:#ff7676;font-weight:bold;}

</style>

</head>

<body>

<div class="wrapper">

<div class="title">⭐ 별과바다 부족 계산기 ⭐</div>
<div class="creator">제작 : 이로하</div>

<div class="main">

<!-- 좌측 : 포획 계산 -->

<div class="card">

<h3>📌 1레벨 포획 계산</h3>

<div class="searchbox">
    <input type="text" id="name" placeholder="페트 이름 입력">
    <button id="search">검색</button>
    <div id="suggest"></div>
</div>

<div class="stats">
    <div class="stat"><label>내구력</label><input id="hp" type="number"></div>
    <div class="stat"><label>공격력</label><input id="atk" type="number"></div>
    <div class="stat"><label>방어력</label><input id="def" type="number"></div>
    <div class="stat"><label>순발력</label><input id="agi" type="number"></div>
</div>

<button class="calcbtn" id="calculate">8등급 계산</button>

<div id="sbox">
<table id="myPet"><tbody></tbody></table>
</div>

<div id="result">
<table>
<thead>
<tr>
<th>순번</th>
<th>등급</th>
<th>내구</th>
<th>공격</th>
<th>방어</th>
<th>순발</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<!-- 우측 : 육성 감정기 -->

<div class="card predict">

<h3>🔍 육성 감정 (현재 스탯 기반)</h3>

<label>현재 레벨</label> <input id="nowLevel" type="number" placeholder="예: 70">

<label>현재 내구력</label> <input id="nowHp" type="number">

<label>현재 공격력</label> <input id="nowAtk" type="number">

<label>현재 방어력</label> <input id="nowDef" type="number">

<label>현재 순발력</label> <input id="nowAgi" type="number">

<button class="calcbtn" onclick="runPrediction()">8등급 가능성 분석</button>

<div class="predictResult" id="predictResult">
레벨과 현재 스탯을 입력하면  
8등급 확률과 120레벨 예상치를 보여줍니다.
</div>

</div>

</div>
</div>

</body>
</html>
