<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>별과바다 부족 계산기</title>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="pet.js?v=7"></script>

<style>
body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(180deg,#dbeafe,#bfdbfe);
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    padding:40px 10px;
}

.wrapper{
    width:1200px;
    max-width:95%;
    background:#344766;
    border-radius:26px;
    padding:30px;
    box-shadow:0 20px 45px rgba(0,0,0,0.25);
    color:white;
}

.title{
    text-align:center;
    font-size:32px;
    font-weight:800;
}

.creator{
    text-align:center;
    color:#ff8fa3;
    font-weight:700;
    margin-bottom:25px;
}

.columns{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
}

.card{
    background:#2a3b55;
    border-radius:18px;
    padding:20px;
}

input{
    width:100%;
    height:40px;
    border-radius:10px;
    border:none;
    padding-left:10px;
    margin-top:6px;
    margin-bottom:10px;
    font-size:15px;
}

button{
    width:100%;
    height:46px;
    border:none;
    border-radius:12px;
    background:#4fc3ff;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

#suggest{
    background:white;
    color:black;
    position:absolute;
    z-index:50;
    width:90%;
    display:none;
    border-radius:8px;
}
#suggest div{ padding:6px; cursor:pointer;}
#suggest div:hover{ background:#eee;}

.resultbox{
    background:#1e2c44;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
    white-space:pre-line;
}

canvas{
    background:white;
    border-radius:12px;
    margin-top:10px;
}
</style>
</head>

<body>
<div class="wrapper">

<div class="title">⭐ 별과바다 부족 계산기 ⭐</div>
<div class="creator">제작 : 라프땅</div>

<div class="columns">

<!-- 왼쪽 : 기존 계산 -->
<div class="card">
<h3>📌 1레벨 포획 계산</h3>

<div style="position:relative">
<input type="text" id="name" placeholder="페트 이름 입력">
<div id="suggest"></div>
</div>

<label>내구력</label>
<input id="hp" type="number">

<label>공격력</label>
<input id="atk" type="number">

<label>방어력</label>
<input id="def" type="number">

<label>순발력</label>
<input id="agi" type="number">

<button id="calculate">8등급 계산</button>

<div id="leftResult" class="resultbox"></div>
</div>

<!-- 가운데 : 성장 분석 -->
<div class="card">
<h3>🔎 육성 감정 (현재 스탯)</h3>

<label>현재 레벨</label>
<input id="curLevel" type="number">

<label>현재 내구력</label>
<input id="curHp" type="number">

<label>현재 공격력</label>
<input id="curAtk" type="number">

<label>현재 방어력</label>
<input id="curDef" type="number">

<label>현재 순발력</label>
<input id="curAgi" type="number">

<button id="analyze">8등급 가능성 분석</button>

<div id="analysisResult" class="resultbox"></div>
</div>

<!-- 오른쪽 : 그래프 -->
<div class="card">
<h3>📈 성장 예측 그래프</h3>
<canvas id="statChart" width="350" height="350"></canvas>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
