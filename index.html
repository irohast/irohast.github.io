<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐별과바다 부족 계산기⭐</title>

<!-- jQuery (오픈소스 호환 유지 핵심) -->

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<!-- Chart -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

<style>
body{
    margin:0;
    background:#edf3ff;
    font-family:Arial, Helvetica, sans-serif;
}
.wrapper{
    max-width:1400px;
    margin:40px auto;
    padding:15px;
}
header{
    text-align:center;
    margin-bottom:25px;
}
header h2{margin:0;}
.creator{
    color:#b04a63;
    font-weight:bold;
}
.sub{
    font-size:13px;
    color:#666;
}

.layout{
    display:grid;
    grid-template-columns: 1fr 1fr 1.4fr;
    gap:20px;
}

.card{
    background:white;
    border-radius:16px;
    padding:18px;
    box-shadow:0 5px 18px rgba(0,0,0,.08);
}

label{
    font-size:14px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:9px;
    border-radius:8px;
    border:1px solid #ccd6e6;
    margin:5px 0 12px 0;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#4a87f5;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.small{
    font-size:13px;
    color:#444;
}

.tabs{
    display:flex;
    gap:6px;
    margin-bottom:10px;
}
.tabs button{
    background:#cfdaf3;
    color:#333;
}
.tabs button.active{
    background:#4a87f5;
    color:white;
}
canvas{
    background:white;
    border-radius:12px;
    padding:10px;
}
</style>

</head>

<body>
<div class="wrapper">

<header>
<h2>⭐ 별과바다 부족 계산기 ⭐</h2>
<div class="creator">제작자 : 라프땅</div>
<div class="sub">최종 수정일 : 2026년 02월 25일</div>
</header>

<div class="layout">

<!-- 좌측 : 오픈소스 초기치 계산 -->

<div class="card">
<label>페트 이름</label>
<input id="name" autocomplete="off">
<div id="sresult" class="small"></div>

<label>1레벨 능력치</label> <input id="hp" placeholder="HP"> <input id="atk" placeholder="ATK"> <input id="def" placeholder="DEF"> <input id="agi" placeholder="AGI">

<button id="search">S초기치 계산</button>

<div id="leftResult" class="small"></div>
</div>

<!-- 가운데 : 성장 분석 -->

<div class="card">
<label>현재 레벨</label>
<input id="level" placeholder="예: 35">

<label>현재 능력치</label> <input id="chp" placeholder="현재 HP"> <input id="catk" placeholder="현재 ATK"> <input id="cdef" placeholder="현재 DEF"> <input id="cagi" placeholder="현재 AGI">

<button id="analyze">120레벨 성장 분석</button>

<div id="analysisResult" class="small"></div>
</div>

<!-- 우측 : 그래프 -->

<div class="card">

<div class="tabs">
<button class="active" data-type="hp">내구</button>
<button data-type="atk">공격</button>
<button data-type="def">방어</button>
<button data-type="agi">순발</button>
<button data-type="sum">총성장</button>
</div>

<canvas id="growthChart" height="170"></canvas>

</div>

</div>
</div>

<script defer src="./pet.js"></script>

</body>
</html>
