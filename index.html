<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐ 별과바다 부족 계산기 ⭐</title>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="./pet.js" defer></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#eef3fb;
}

header{
    background:linear-gradient(180deg,#7faee8,#93bdf0);
    text-align:center;
    padding:22px 10px;
}
header h1{margin:0;font-size:24px;}
header .sub{font-size:13px;margin-top:6px;}

.wrapper{
    max-width:720px;
    margin:35px auto;
    padding:0 20px;
}

.card{
    background:white;
    border-radius:14px;
    padding:18px;
    box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

h2{
    margin-top:0;
    font-size:17px;
}

label{
    font-size:13px;
    font-weight:bold;
    margin-top:12px;
    display:block;
}

.input-row{
    display:flex;
    align-items:center;
    gap:6px;
}

input{
    flex:1;
    padding:8px 10px;
    border-radius:8px;
    border:1px solid #cfd7e6;
}

button{
    padding:8px 10px;
    border:none;
    border-radius:8px;
    background:#4a86e8;
    color:white;
    cursor:pointer;
}

button.small{
    width:30px;
    padding:6px;
}

#pet-suggestions{
    list-style:none;
    margin:0;
    padding:0;
    max-height:220px;
    overflow-y:auto;
    border:1px solid #ccd6e5;
    border-radius:8px;
    background:white;
    position:absolute;
    width:100%;
    z-index:999;
}

#pet-suggestions li{
    padding:6px 8px;
    cursor:pointer;
}
#pet-suggestions li:hover{
    background:#e6f0ff;
}

.suggest-wrap{
    position:relative;
}

#myPet{
    margin-top:15px;
}

table{
    width:100%;
    font-size:13px;
    border-collapse:collapse;
}
td,th{
    padding:6px;
    border-bottom:1px solid #e6edf5;
}
</style>
</head>

<body>

<header>
<h1>⭐ 별과바다 부족 계산기 ⭐</h1>
<div style="color:#c53030;font-weight:bold;">제작자 : 라프땅</div>
<div class="sub">최종 수정일 : 26년 02월 25일</div>
</header>

<div class="wrapper">
<div class="card">

<h2>초기치 8등급 확률 계산</h2>

<label>페트 이름</label>
<div class="suggest-wrap input-row">
<button id="dropdownBtn" class="small">▼</button>
<input id="name" autocomplete="off">
<button id="searchBtn" class="small">🔍</button>
<ul id="pet-suggestions"></ul>
</div>

<label>내구력</label>
<div class="input-row">
<button class="small" onclick="changeStat('hp',-1)">-</button>
<input id="hp" type="number">
<button class="small" onclick="changeStat('hp',1)">+</button>
</div>

<label>공격력</label>
<div class="input-row">
<button class="small" onclick="changeStat('atk',-1)">-</button>
<input id="atk" type="number">
<button class="small" onclick="changeStat('atk',1)">+</button>
</div>

<label>방어력</label>
<div class="input-row">
<button class="small" onclick="changeStat('def',-1)">-</button>
<input id="def" type="number">
<button class="small" onclick="changeStat('def',1)">+</button>
</div>

<label>순발력</label>
<div class="input-row">
<button class="small" onclick="changeStat('agi',-1)">-</button>
<input id="agi" type="number">
<button class="small" onclick="changeStat('agi',1)">+</button>
</div>

<button id="calculateBtn" style="margin-top:14px;width:100%;">계산하기</button>

<div id="myPet"></div>
<div id="resultArea"></div>

</div>
</div>

</body>
</html>
