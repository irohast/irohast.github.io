<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8">
<title>별과바다 부족 - 펫 계산기</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

<style>
body{
    background:linear-gradient(180deg,#dff4ff,#eefaff,#f7fdff);
    font-family:'Malgun Gothic';
}

.container{
    max-width:900px;
}

.title{
    text-align:center;
    margin:30px 0 20px;
}
.title small{
    color:#2aa7e8;
    font-weight:bold;
}

.card{
    background:white;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    padding:20px;
    margin-bottom:20px;
}

.stat-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.btn-main{
    background:#57b7e4;
    border:none;
    color:white;
    height:50px;
    font-size:18px;
}
.btn-main:hover{
    background:#3aa6d7;
}

#result-wrapper{
    max-height:400px;
    overflow-y:auto;
}

/* 자동완성 목록 */
#pet-suggestions{
    list-style:none;
    padding:0;
    margin-top:5px;
    border:1px solid #ddd;
    border-radius:8px;
    max-height:260px;
    overflow-y:auto;
    display:none;
    background:white;
    position:relative;
    z-index:999;
}
#pet-suggestions li{
    padding:8px;
}
#pet-suggestions li:hover{
    background:#e9f7ff;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="title">
<h2>Happy Pet Calculator</h2>
<small>⭐별과바다 부족⭐</small>
</div>

<div class="card">

<label>페트 이름</label>

<div class="input-group">

<span class="input-group-btn">
<button class="btn btn-default" id="showAll">▼</button>
</span>

<input type="text" class="form-control" id="name" autocomplete="off">

<span class="input-group-btn">
<button class="btn btn-info" id="search">검색</button>
</span>

</div>

<ul id="pet-suggestions"></ul>

<hr>

<div class="stat-row">
<div>
<label>내구</label>
<input type="number" id="hp" class="form-control">
</div>

<div>
<label>공격</label>
<input type="number" id="atk" class="form-control">
</div>

<div>
<label>방어</label>
<input type="number" id="def" class="form-control">
</div>

<div>
<label>순발</label>
<input type="number" id="agi" class="form-control">
</div>
</div>

<br>
<button id="calculate" class="btn btn-main btn-block">결과 계산하기</button>

</div>

<!-- S초기치 / S성장률 표 -->

<div class="card" id="myPet" style="display:none;">
<table class="table table-bordered">
<thead>
<tr>
<th>구분</th>
<th>내구</th>
<th>공격</th>
<th>방어</th>
<th>순발</th>
<th>합</th>
</tr>
</thead>

<tbody>
<tr class="srank">
<td id="srank-label">S 초기치</td>
<td></td>
<td></td>
<td></td>
<td></td>
<td></td>
</tr>
<tr class="srank">
<td>S 성장률</td>
<td></td>
<td></td>
<td></td>
<td></td>
<td></td>
</tr>
</tbody>

</table>
</div>

<!-- 분포표 -->

<div class="card" id="result-master-container" style="display:none;">
<div id="result-wrapper">
<table class="table table-striped" id="result">
<thead>
<tr>
<th>번호</th>
<th>등급</th>
<th>내구</th>
<th>공격</th>
<th>방어</th>
<th>순발</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

</div>

<script>
var pet = [];
let btnName = "";
const result = [];

function loadPetData() {
    return $.getJSON('./pets.json?v=' + new Date().getTime())
        .done(function(data) { 
            pet = data;
            pet.sort((a,b)=>a.name.localeCompare(b.name,'ko'));
        });
}

function showSuggestions(inputVal) {
    inputVal = inputVal.toLowerCase();
    let matches = inputVal ? pet.filter(p => p.name.toLowerCase().includes(inputVal)) : [];
    let $ul = $('#pet-suggestions');
    $ul.empty();

    matches.slice(0,15).forEach(p=>{
        $ul.append('<li>'+p.name+'</li>');
    });

    matches.length ? $ul.show() : $ul.hide();
}

function showAllPets(){
    let $ul = $('#pet-suggestions');
    $ul.empty();
    pet.forEach(p=>{
        $ul.append('<li>'+p.name+'</li>');
    });
    $ul.show();
}

$(document).ready(function() {

    loadPetData();

    $("#name").on("input", function(){
        showSuggestions($(this).val());
    });

    $("#showAll").on("click", function(){
        showAllPets();
    });

    $(document).on("mousedown", "#pet-suggestions li", function(){
        $("#name").val($(this).text());
        $("#pet-suggestions").hide();
        $("#search").click();
    });

    $(document).click(function(e){
        if(!$(e.target).closest('#name, #pet-suggestions, #showAll').length){
            $('#pet-suggestions').hide();
        }
    });

    $("#search, #calculate").on("click", function() {
        if (pet.length === 0) return;

        const foundPet = pet.find(p => p.name === $("#name").val());
        if (!foundPet) { alert("페트 정보를 찾을 수 없습니다."); return; }

        $("#result-master-container").show();
        btnName = this.id;
        $("#myPet").show();

        const copiedPet = JSON.parse(JSON.stringify(foundPet));
        setSRank(copiedPet);
        setBase(foundPet);
    });
});
</script>

<script src="pet.js"></script>

</body>
</html>
