<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>⭐별과바다 부족 계산기⭐</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Pretendard, Arial;
background:#eef5ff;
}
header{
background:linear-gradient(#7fbaff,#a9d2ff);
text-align:center;
padding:22px 10px 18px;
color:white;
}
.creator{color:#b54b5c;font-weight:bold;}
.container{
display:flex;
gap:22px;
padding:24px;
}
.panel{
background:white;
border-radius:16px;
padding:18px;
width:33%;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}
input,select{
width:100%;
padding:9px;
margin:6px 0 12px;
border-radius:10px;
border:1px solid #ccd6ea;
background:#f7fbff;
}
button{
width:100%;
padding:11px;
border:none;
border-radius:12px;
background:#5aa2ff;
color:white;
font-weight:bold;
cursor:pointer;
}
.result{margin-top:10px;font-weight:bold;color:#e24a5a;}
canvas{background:white;border-radius:12px;}
</style>
</head>

<body>

<header>
<h1>⭐ 별과바다 부족 계산기 ⭐</h1>
<div class="creator">제작자 : 라프땅</div>
<div>최종 수정일 : 2026년 02월 25일</div>
</header>

<div class="container">

<!-- 좌측 -->
<div class="panel">
<h2>초기치 8등급 확률</h2>

페트 이름
<select id="purePet"></select>

공격 초기치
<input id="hp">
방어 초기치
<input id="atk">
순발 초기치
<input id="def">
내구 초기치
<input id="agi">

<button onclick="runSRank()">계산</button>
<div class="result" id="pureResult">-</div>
</div>

<!-- 중앙 -->
<div class="panel">
<h2>성장 분석</h2>

페트 이름
<select id="petSelect"></select>

<h3>S 초기치</h3>
공<input id="s_atk" readonly>
방<input id="s_def" readonly>
순<input id="s_agi" readonly>
내<input id="s_hp" readonly>

현재 레벨
<input id="curLv" value="50">

현재 공격
<input id="cur_atk">
현재 방어
<input id="cur_def">
현재 순발
<input id="cur_agi">
현재 내구
<input id="cur_hp">

<button onclick="analyze()">120레벨 기대 분석</button>
<div class="result" id="futureResult">-</div>
</div>

<!-- 우측 -->
<div class="panel">
<h2>150레벨 성장 그래프</h2>
<canvas id="growthChart"></canvas>
</div>

</div>

<script src="pet.js"></script>
</body>
</html>
