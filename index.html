<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>⭐별과바다 부족 계산기⭐</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family: "Pretendard", Arial, sans-serif;
    background:#eef5ff; /* 연한 파스텔 블루 */
}

/* 상단 */
header{
    background:linear-gradient(180deg,#79b7ff,#a8d1ff);
    text-align:center;
    padding:22px 10px 18px 10px;
    box-shadow:0 3px 12px rgba(0,0,0,0.15);
}
header h1{
    margin:0;
    color:white;
    font-size:30px;
    letter-spacing:1px;
}
.creator{
    margin-top:6px;
    color:#b74b5a; /* 밝은 버건디 */
    font-weight:bold;
}
.date{
    color:#ffffff;
    opacity:0.9;
    font-size:13px;
}

/* 레이아웃 */
.container{
    display:flex;
    gap:22px;
    padding:25px;
}

.panel{
    background:#ffffff;
    border-radius:16px;
    padding:18px;
    width:33%;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.panel h2{
    margin-top:0;
}

/* 입력 UI */
label{
    font-size:14px;
    color:#333;
}

input,select{
    width:100%;
    padding:9px;
    margin-top:6px;
    margin-bottom:12px;
    border-radius:10px;
    border:1px solid #ccd6ea;
    background:#f7fbff;
}

.readonly{
    background:#e9f1fb;
}

/* 버튼 */
button{
    width:100%;
    padding:11px;
    border:none;
    border-radius:12px;
    background:#5aa2ff;
    color:white;
    font-weight:bold;
    font-size:15px;
    cursor:pointer;
}
button:hover{
    background:#3d8df7;
}

/* 결과 */
.result{
    margin-top:12px;
    font-weight:bold;
    font-size:18px;
    color:#e24a5a;
}

canvas{
    background:white;
    border-radius:12px;
}
</style>
</head>

<body>

<header>
    <h1>⭐ 별과바다 부족 계산기 ⭐</h1>
    <div class="creator">제작자 : 라프땅</div>
    <div class="date">최종 수정일 : 2026년 02월 25일</div>
</header>

<div class="container">

<!-- 좌측 -->
<div class="panel">
<h2>초기치 8등급 확률</h2>

<label>페트 이름</label>
<select id="purePetSelect"></select>

<label>공격 초기치</label>
<input id="l_atk" type="number">

<label>방어 초기치</label>
<input id="l_def" type="number">

<label>순발 초기치</label>
<input id="l_agi" type="number">

<label>내구 초기치</label>
<input id="l_hp" type="number">

<button onclick="calcPure()">계산</button>
<div class="result" id="pureResult">-</div>
</div>

<!-- 중앙 -->
<div class="panel">
<h2>성장 분석</h2>

<label>페트 이름</label>
<select id="petSelect" onchange="loadPet()"></select>

<h3>S 초기치</h3>
<label>공</label>
<input id="s_atk" class="readonly" readonly>
<label>방</label>
<input id="s_def" class="readonly" readonly>
<label>순</label>
<input id="s_agi" class="readonly" readonly>
<label>내</label>
<input id="s_hp" class="readonly" readonly>

<h3>내 1레벨 초기치</h3>
<label>공</label>
<input id="my_atk" type="number">
<label>방</label>
<input id="my_def" type="number">
<label>순</label>
<input id="my_agi" type="number">
<label>내</label>
<input id="my_hp" type="number">

<label>현재 레벨</label>
<input id="curLv" type="number" value="50">

<label>현재 공격</label>
<input id="cur_atk" type="number">
<label>현재 방어</label>
<input id="cur_def" type="number">
<label>현재 순발</label>
<input id="cur_agi" type="number">
<label>현재 내구</label>
<input id="cur_hp" type="number">

<button onclick="analyze()">120레벨 기대값 계산</button>
<div class="result" id="futureResult">-</div>
</div>

<!-- 우측 -->
<div class="panel">
<h2>150레벨 성장 그래프</h2>
<canvas id="growthChart"></canvas>
</div>

</div>

<script src="pet.js"></script>
</body>
</html>
