<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8">
<title>라프땅의 놀이터</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

<style>
:root{
    --bg:#ffffff;
    --text:#111;
    --input:#ffffff;
    --border:#c9c9c9;
    --card:#f3f4f6;
}
@media (prefers-color-scheme: dark){
:root{
    --bg:#0f1115;
    --text:#eee7c9;
    --input:#0e0f13;
    --border:#7c6f4a;
    --card:#1a1d22;
}
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Pretendard,sans-serif;
}

.container{max-width:900px;}

.title{text-align:center;margin-top:30px;}
.title small{color:#ffd84d;}

#pet-suggestions-box{
    display:none;
    position:absolute;
    z-index:9999;
    width:100%;
    background:var(--card);
    border:1px solid var(--border);
}
#pet-suggestions{list-style:none;margin:0;padding:0;}
#pet-suggestions li{padding:6px;cursor:pointer;}
#pet-suggestions li:hover{background:#3333;}

#result{
    max-height:260px;
    overflow-y:auto;
    display:block;
}
</style>

</head>

<body>

<div class="container">

<div class="title">
<h2>🎲 별바 계산기 🎲</h2>
<small>⭐ 별과바다 부족 ⭐</small>
</div>
<hr>

<div class="stat-wrapper">

<label>펫 이름</label> <input type="text" class="form-control" id="name" autocomplete="off">

<div id="pet-suggestions-box">
<ul id="pet-suggestions"></ul>
</div>

<div class="row" style="margin-top:20px">

<div class="col-sm-3">
<label>내구</label>
<div class="input-group">
<span class="input-group-btn"><button class="btn btn-default" onclick="changeStat('hp',-1)">-</button></span>
<input type="number" id="hp" class="form-control" step="0.01">
<span class="input-group-btn"><button class="btn btn-default" onclick="changeStat('hp',1)">+</button></span>
</div>
</div>

<div class="col-sm-3">
<label>공격</label>
<div class="input-group">
<span class="input-group-btn"><button class="btn btn-default" onclick="changeStat('atk',-1)">-</button></span>
<input type="number" id="atk" class="form-control" step="0.01">
<span class="input-group-btn"><button class="btn btn-default" onclick="changeStat('atk',1)">+</button></span>
</div>
</div>

<div class="col-sm-3">
<label>방어</label>
<div class="input-group">
<span class="input-group-btn"><button class="btn btn-default" onclick="changeStat('def',-1)">-</button></span>
<input type="number" id="def" class="form-control" step="0.01">
<span class="input-group-btn"><button class="btn btn-default" onclick="changeStat('def',1)">+</button></span>
</div>
</div>

<div class="col-sm-3">
<label>순발</label>
<div class="input-group">
<span class="input-group-btn"><button class="btn btn-default" onclick="changeStat('agi',-1)">-</button></span>
<input type="number" id="agi" class="form-control" step="0.01">
<span class="input-group-btn"><button class="btn btn-default" onclick="changeStat('agi',1)">+</button></span>
</div>
</div>

</div>

<button type="button" id="calculate" class="btn btn-primary btn-block" style="margin-top:20px">
결과 계산하기
</button>

</div>

<div id="result-master-container" style="margin-top:25px;">
<div id="result" class="table-responsive">
<table class="table table-striped table-condensed">
<thead>
<tr>
<th>순번</th>
<th>등급</th>
<th>내구</th>
<th>공격</th>
<th>방어</th>
<th>순발</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

</div>

<script src="pet.js"></script>

</body>
</html>
