<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐ 별과바다 부족 펫 계산기 ⭐</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="pet.js"></script>

<style>
body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(180deg,#dbeafe,#bfdbfe);
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#1e293b;
}

.container{
    width:380px;
    padding:30px;
    border-radius:22px;
    background:#2f4363;
    box-shadow:0 18px 40px rgba(0,0,0,0.25);
    text-align:center;
    color:white;
}

h1{
    margin:0 0 5px 0;
}

.creator{
    font-size:15px;
    font-weight:800;
    color:#b56576;
    margin-bottom:20px;
}

.stat{
    margin:10px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.stat label{
    width:70px;
    text-align:left;
}

input{
    width:120px;
    padding:8px;
    border-radius:10px;
    border:none;
    text-align:center;
    font-size:15px;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:14px;
    background:#4fc3ff;
    color:#001b3a;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#7dd3fc;
}

table{
    width:100%;
    margin-top:20px;
    background:white;
    color:black;
    border-radius:10px;
    overflow:hidden;
    font-size:13px;
}

th, td{
    padding:6px;
    text-align:center;
}

thead{
    background:#4fc3ff;
    color:#001b3a;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>⭐ 별과바다 부족 계산기 ⭐</h1>
<div class="creator">제작 : 이로하</div>

<div class="stat">
    <label>이름</label>
    <input id="name" type="text" placeholder="예: 무이">
</div>

<div class="stat">
    <label>HP</label>
    <input id="hp" type="number">
</div>

<div class="stat">
    <label>ATK</label>
    <input id="atk" type="number">
</div>

<div class="stat">
    <label>DEF</label>
    <input id="def" type="number">
</div>

<div class="stat">
    <label>AGI</label>
    <input id="agi" type="number">
</div>

<button id="calculate">결과 계산하기</button>

<table id="myPet">
<tbody></tbody>
</table>

<table id="result">
<thead>
<tr>
<th>순번</th>
<th>등급</th>
<th>HP</th>
<th>ATK</th>
<th>DEF</th>
<th>AGI</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>
let pet = [];
let result = [];
let btnName = "calculate";

$(document).ready(function(){

    $.getJSON("./pets.json", function(data){
        pet = data;
    });

    $("#calculate").click(function(){

        const name = $("#name").val().trim();
        const foundPet = pet.find(p => p.name === name);

        if(!foundPet){
            alert("펫 이름을 정확히 입력하세요.");
            return;
        }

        btnName = "calculate";

        $("#myPet tbody").empty();
        $("#result tbody").empty();

        const copiedPet = JSON.parse(JSON.stringify(foundPet));

        setSRank(copiedPet);
        setBase(foundPet);
    });

});
</script>

</body>
</html>
