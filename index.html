<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>별과바다 부족 펫 계산기</title>

<!-- jquery (엔진보다 반드시 먼저) -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<!-- 계산 엔진 -->
<script src="pet.js"></script>

<style>

/* 배경 */
body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(180deg,#dbeafe,#bfdbfe);
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    padding:40px 10px;
}

/* 메인 카드 */
.wrapper{
    width:720px;
    max-width:95%;
    background:#344766;
    border-radius:26px;
    padding:30px 30px 40px 30px;
    box-shadow:0 20px 45px rgba(0,0,0,0.25);
    color:white;
}

/* 타이틀 */
.title{
    text-align:center;
    font-size:32px;
    font-weight:800;
    margin-bottom:5px;
}

.creator{
    text-align:center;
    color:#ff8fa3;
    font-weight:700;
    margin-bottom:25px;
}

/* 검색 */
.searchbox{
    display:flex;
    margin-bottom:20px;
    position:relative;
}

.searchbox input{
    flex:1;
    height:46px;
    border:none;
    border-radius:12px 0 0 12px;
    padding:0 12px;
    font-size:16px;
}

.searchbox button{
    width:90px;
    border:none;
    background:#55b6e6;
    color:#00314d;
    font-weight:bold;
    border-radius:0 12px 12px 0;
    cursor:pointer;
}

/* 자동완성 */
#suggest{
    position:absolute;
    top:46px;
    width:100%;
    background:white;
    color:black;
    border-radius:0 0 12px 12px;
    display:none;
    z-index:10;
}
#suggest div{
    padding:8px;
    cursor:pointer;
}
#suggest div:hover{
    background:#eee;
}

/* 스탯 입력 */
.stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:15px;
}

.stat label{
    font-size:14px;
}

.stat input{
    width:100%;
    height:40px;
    border-radius:10px;
    border:none;
    padding-left:10px;
    font-size:15px;
}

/* 버튼 */
.calcbtn{
    width:100%;
    height:50px;
    margin-top:22px;
    border:none;
    border-radius:14px;
    background:#4fc3ff;
    font-size:18px;
    font-weight:bold;
    color:#00213f;
    cursor:pointer;
}

/* S초기치 박스 */
#sbox{
    background:#f1f1f1;
    color:black;
    margin-top:22px;
    padding:15px;
    border-radius:14px;
    display:none;
}

/* 결과표 */
table{
    width:100%;
    background:white;
    color:black;
    margin-top:20px;
    border-radius:12px;
    overflow:hidden;
}

th{
    background:#5bb7e2;
}

th,td{
    padding:8px;
    text-align:center;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="title">⭐ 별과바다 부족 계산기 ⭐</div>
<div class="creator">제작 : 이로하</div>

<!-- 검색 -->
<div class="searchbox">
    <input type="text" id="name" placeholder="페트 이름 입력">
    <button id="search">검색</button>
    <div id="suggest"></div>
</div>

<!-- 스탯 -->
<div class="stats">
    <div class="stat"><label>HP</label><input id="hp" type="number"></div>
    <div class="stat"><label>ATK</label><input id="atk" type="number"></div>
    <div class="stat"><label>DEF</label><input id="def" type="number"></div>
    <div class="stat"><label>AGI</label><input id="agi" type="number"></div>
</div>

<button class="calcbtn" id="calculate">결과 계산하기</button>

<!-- S초기치 -->
<div id="sbox">
    <table id="myPet"><tbody></tbody></table>
</div>

<!-- 결과 -->
<div id="result">
<table>
<thead>
<tr>
<th>순번</th>
<th>등급</th>
<th>HP</th>
<th>ATK</th>
<th>DEF</th>
<th>AGI</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>

/* 전역 (엔진이 사용) */
var pet=[];
let btnName="";
const result=[];

/* 데이터 로드 */
function loadPetData(){
    $.getJSON("pets.json?v="+new Date().getTime(),function(data){
        pet=data;
        console.log("펫 로딩 완료:",pet.length);
    });
}

/* 자동완성 */
$("#name").on("input",function(){
    let val=$(this).val().toLowerCase();
    if(!val){$("#suggest").hide();return;}
    let list=pet.filter(p=>p.name.toLowerCase().includes(val)).slice(0,10);
    let html="";
    list.forEach(p=>html+="<div>"+p.name+"</div>");
    $("#suggest").html(html).show();
});

$(document).on("click","#suggest div",function(){
    $("#name").val($(this).text());
    $("#suggest").hide();
});

/* 검색(S초기치만) */
$("#search").click(function(){
    let found=pet.find(p=>p.name===$("#name").val());
    if(!found){alert("페트를 찾을 수 없습니다");return;}
    btnName="search";
    $("#sbox").show();
    setSRank(JSON.parse(JSON.stringify(found)));
});

/* 계산 */
$("#calculate").click(function(){
    let found=pet.find(p=>p.name===$("#name").val());
    if(!found){alert("페트를 찾을 수 없습니다");return;}
    btnName="calculate";
    setBase(found);
});

/* 시작시 DB 로딩 */
loadPetData();

</script>

</body>
</html>
