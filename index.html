<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>별과바다 부족 - 펫 계산기</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

<style>
body{
    background:linear-gradient(180deg,#dff4ff,#eefaff,#f7fdff);
    font-family:'Malgun Gothic';
}

/* 전체 폭 축소 */
.main-wrapper{
    max-width:520px;
    margin:30px auto;
}

.title{
    text-align:center;
    margin-bottom:20px;
}

.title small{
    color:#2aa7e8;
    font-weight:bold;
}

/* 카드 */
.card{
    background:white;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    padding:18px;
    margin-bottom:18px;
}

/* 자동완성 */
#pet-suggestions{
    list-style:none;
    padding:0;
    margin:5px 0 0 0;
    border:1px solid #ddd;
    border-radius:8px;
    max-height:180px;
    overflow-y:auto;
}
#pet-suggestions li{
    padding:8px;
    cursor:pointer;
}
#pet-suggestions li:hover{
    background:#eef8ff;
}

/* 능력치 한 줄 */
.stat-line{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
}
.stat-line label{
    font-size:12px;
    text-align:center;
    margin-bottom:3px;
}

/* 버튼 */
.btn-main{
    background:#57b7e4;
    border:none;
    color:white;
    height:46px;
    font-size:17px;
}

#result-wrapper{
    max-height:360px;
    overflow-y:auto;
}
</style>
</head>

<body>

<div class="main-wrapper">

<div class="title">
<h3>Happy Pet Calculator</h3>
<small>⭐별과바다 부족⭐</small>
</div>

<div class="card">

<label>페트 이름</label>
<input type="text" id="name" class="form-control" autocomplete="off">
<ul id="pet-suggestions"></ul>

<hr>

<div class="stat-line">
<div>
<label>내구</label>
<input type="number" id="hp" class="form-control">
</div>
<div>
<label>공격</label>
<input type="number" id="atk" class="form-control">
</div>
<div>
<label>방어</label>
<input type="number" id="def" class="form-control">
</div>
<div>
<label>순발</label>
<input type="number" id="agi" class="form-control">
</div>
</div>

<br>
<button id="calculate" class="btn btn-main btn-block">결과 계산하기</button>

</div>

<div class="card" id="myPet" style="display:none;">
<table class="table table-bordered">
<thead>
<tr>
<th>구분</th>
<th>내구</th>
<th>공격</th>
<th>방어</th>
<th>순발</th>
<th>합</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="card" id="result-master-container" style="display:none;">
<div id="result-wrapper">
<table class="table table-striped" id="result">
<thead>
<tr>
<th>번호</th>
<th>등급</th>
<th>내구</th>
<th>공격</th>
<th>방어</th>
<th>순발</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

</div>

<script src="pet.js"></script>
<script src="ui.js"></script>

</body>
</html>
