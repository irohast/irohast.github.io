<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐ 별과바다 부족 계산기 ⭐</title>

<script src="./pet.js" defer></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#eaf1fb;
}

header{
    background:linear-gradient(180deg,#7da9e8,#8fb6ef);
    text-align:center;
    padding:25px 10px;
}

header h1{
    margin:0;
    font-size:26px;
}

header .sub{
    margin-top:6px;
    font-size:14px;
}

.wrapper{
    max-width:1400px;
    margin:40px auto;
    padding:0 30px;
}

.grid{
    display:grid;
    grid-template-columns: 380px 380px 1fr;
    gap:25px;
}

.card{
    background:white;
    border-radius:16px;
    padding:20px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.card h2{
    margin-top:0;
    font-size:18px;
    margin-bottom:15px;
}

label{
    font-size:13px;
    font-weight:bold;
    display:block;
    margin-top:10px;
}

input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ccd6e5;
    margin-top:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#4c86e8;
    color:white;
    font-weight:bold;
    margin-top:15px;
    cursor:pointer;
}

button:hover{
    background:#3b6fcb;
}

#pet-suggestions{
    list-style:none;
    padding:0;
    margin:0;
    max-height:250px;
    overflow-y:auto;
    border:1px solid #ccd6e5;
    border-radius:10px;
    background:white;
    position:absolute;
    width:100%;
    z-index:999;
}

#pet-suggestions li{
    padding:8px 10px;
    cursor:pointer;
}

#pet-suggestions li:hover{
    background:#e6f0ff;
}

.suggest-wrap{
    position:relative;
}

#sinfo{
    margin-top:10px;
    font-size:13px;
    font-weight:bold;
}

@media(max-width:1200px){
    .grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<header>
<h1>⭐ 별과바다 부족 계산기 ⭐</h1>
<div style="color:#c53030;font-weight:bold;">제작자 : 라프땅</div>
<div class="sub">최종 수정일 : 26년 02월 25일</div>
</header>

<div class="wrapper">
<div class="grid">

<!-- 좌측 -->
<div class="card">
<h2>초기치 8등급 확률</h2>

<label>페트 이름</label>
<div class="suggest-wrap">
<input id="name" autocomplete="off">
<ul id="pet-suggestions"></ul>
</div>

<div id="sinfo"></div>

<label>내구력</label>
<input id="hp" type="number">

<label>공격력</label>
<input id="atk" type="number">

<label>방어력</label>
<input id="def" type="number">

<label>순발력</label>
<input id="agi" type="number">

<button id="calcBtn">8등급 확률 계산</button>

</div>

<!-- 가운데 -->
<div class="card">
<h2>성장 분석</h2>

<label>현재 레벨</label>
<input id="curLv" type="number">

<label>현재 내구력</label>
<input id="curHp" type="number">

<label>현재 공격력</label>
<input id="curAtk" type="number">

<label>현재 방어력</label>
<input id="curDef" type="number">

<label>현재 순발력</label>
<input id="curAgi" type="number">

<button>120레벨 성장 분석</button>
</div>

<!-- 우측 -->
<div class="card">
<h2>성장 그래프</h2>
<canvas id="graphArea" style="height:500px;"></canvas>
</div>

</div>
</div>

</body>
</html>
