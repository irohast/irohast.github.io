<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8">
<title>라프땅의 놀이터</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

<style>
body{
    background:#0f1115;
    color:#eee7c9;
    font-family:Pretendard, sans-serif;
}

/* 제목 */
.title{
    text-align:center;
    margin-top:30px;
}
.title small{
    color:#ffd84d;
}

/* 펫 이름 입력 */
#name{
    height:45px;
    font-size:16px;
}

/* 자동완성 */
#pet-suggestions-box{
    display:none;
    position:relative;
    background:#1a1d22;
    border:1px solid #444;
}
#pet-suggestions{
    list-style:none;
    margin:0;
    padding:0;
}
#pet-suggestions li{
    padding:6px;
    cursor:pointer;
}
#pet-suggestions li:hover{
    background:#333;
}

/* 스탯 한 줄 정렬 */
.stat-card .row{
    display:flex;
    gap:10px;
    flex-wrap:nowrap;
}
.stat-card .col-xs-6{
    width:25% !important;
    padding:0;
}

/* 스탯 입력창 */
.stat-group input{
    background:#0e0f13;
    color:#fff;
    border:1px solid #7c6f4a;
    text-align:center;
    height:42px;
}

/* 계산 버튼 */
#calculate{
    margin-top:15px;
    height:50px;
    font-size:17px;
    background:#6c6450;
    border:none;
}

/* 우수확률 표시 */
.srank{
    font-size:42px !important;
    color:#8fff98 !important;
    text-align:center;
    font-weight:bold;
}
.srank::before{
    content:"우수확률";
    display:block;
    font-size:18px;
    color:#ffd84d;
    margin-bottom:6px;
}

/* 결과 리스트 10개 스크롤 */
#result{
    max-height:260px;
    overflow-y:auto;
    display:block;
}
</style>

</head>

<body>

<div class="container">

<div class="title">
<h2>🎲별바 계산기🎲</h2>
<small>⭐ 별과바다 부족 ⭐</small>
</div>
<hr>

<div class="stat-card">

<div class="stat-label">펫 이름</div>

<div class="input-group">
<input type="text" class="form-control" id="name" autocomplete="off">
<span class="input-group-btn">
<button class="btn btn-primary" id="search">
<span class="glyphicon glyphicon-search"></span>
</button>
</span>
</div>

<div id="pet-suggestions-box">
<ul id="pet-suggestions"></ul>
</div>

<br>

<div class="row">

<div class="col-xs-6">
<div class="stat-label">내구</div>
<div class="input-group stat-group">
<span class="input-group-btn">
<button class="btn btn-default" onclick="changeStat('hp',-1)">-</button>
</span>
<input type="number" id="hp" step="0.01">
<span class="input-group-btn">
<button class="btn btn-default" onclick="changeStat('hp',1)">+</button>
</span>
</div>
</div>

<div class="col-xs-6">
<div class="stat-label">공격</div>
<div class="input-group stat-group">
<span class="input-group-btn">
<button class="btn btn-default" onclick="changeStat('atk',-1)">-</button>
</span>
<input type="number" id="atk" step="0.01">
<span class="input-group-btn">
<button class="btn btn-default" onclick="changeStat('atk',1)">+</button>
</span>
</div>
</div>

<div class="col-xs-6">
<div class="stat-label">방어</div>
<div class="input-group stat-group">
<span class="input-group-btn">
<button class="btn btn-default" onclick="changeStat('def',-1)">-</button>
</span>
<input type="number" id="def" step="0.01">
<span class="input-group-btn">
<button class="btn btn-default" onclick="changeStat('def',1)">+</button>
</span>
</div>
</div>

<div class="col-xs-6">
<div class="stat-label">순발</div>
<div class="input-group stat-group">
<span class="input-group-btn">
<button class="btn btn-default" onclick="changeStat('agi',-1)">-</button>
</span>
<input type="number" id="agi" step="0.01">
<span class="input-group-btn">
<button class="btn btn-default" onclick="changeStat('agi',1)">+</button>
</span>
</div>
</div>

</div>

<button type="button" id="calculate" class="btn btn-primary btn-block">
결과 계산하기
</button>

</div>

<!-- 결과 출력 영역 (pet.js가 직접 사용 — id 절대 변경 금지) -->

<div id="result-master-container" style="margin-top:20px;">
<div id="result" class="table-responsive">
<table class="table table-striped table-condensed">
<thead>
<tr>
<th>순번</th>
<th>등급</th>
<th>내구</th>
<th>공격</th>
<th>방어</th>
<th>순발</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

</div>

<script src="pet.js"></script>

</body>
</html>
