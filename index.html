<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>⭐ 별과바다 부족 계산기 ⭐</title>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

<style>
body{background:#eef2f6;font-family:"맑은 고딕",sans-serif;}
.wrapper{max-width:1150px;margin:30px auto;padding:25px;background:#fff;border-radius:14px;box-shadow:0 8px 25px rgba(0,0,0,.08);} 
h2{margin-top:5px;font-weight:700}
.sub{color:#c0392b;font-weight:700}
.section{margin-top:18px;padding:18px;border-radius:12px;background:#f7f9fc}
label{font-weight:600;margin-top:6px}
input{height:40px!important}
.btn-main{margin-top:12px;height:44px;font-weight:700}
#myPet{margin-top:15px}
.graph-area{margin-top:25px}
.graph-card{background:#fff;border-radius:12px;padding:15px;margin-top:18px;box-shadow:0 4px 14px rgba(0,0,0,.07)}
canvas{max-height:340px}
.legend-box{margin-top:10px;font-size:13px}
.footer{text-align:center;margin-top:18px;color:#666;font-size:12px}
</style>
</head>

<body>
<div class="wrapper">

<div class="text-center">
<h2>⭐ 별과바다 부족 계산기 ⭐</h2>
<div class="sub">제작자 : 라프땅</div>
<div>최종 수정일 : 26년 02월 25일</div>
</div>

<div class="section">
<div class="row">
<div class="col-md-6">
<label>페트 이름</label>
<div class="input-group">
<input id="name" class="form-control" placeholder="이름 입력">
<span class="input-group-btn">
<button id="search" class="btn btn-primary">검색</button>
</span>
</div>

<label>HP</label>
<input id="hp" type="number" class="form-control">

<label>공격</label>
<input id="atk" type="number" class="form-control">

<label>방어</label>
<input id="def" type="number" class="form-control">

<label>순발</label>
<input id="agi" type="number" class="form-control">

<button id="calculate" class="btn btn-primary btn-block btn-main">8등급 확률 계산</button>
</div>

<div class="col-md-6">
<table class="table table-bordered" id="myPet" style="display:none">
<tbody></tbody>
</table>
</div>
</div>
</div>

<div id="result-master-container" style="display:none">
<div class="section">
<div class="table-responsive" id="result">
<table class="table table-striped table-condensed">
<thead>
<tr>
<th>순번</th>
<th>등급</th>
<th>내구</th>
<th>공격</th>
<th>방어</th>
<th>순발</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>
</div>

<div class="graph-area">
<div class="graph-card">
<h4>내구 성장률</h4>
<canvas id="chart-hp"></canvas>
</div>

<div class="graph-card">
<h4>공격 성장률</h4>
<canvas id="chart-atk"></canvas>
</div>

<div class="graph-card">
<h4>방어 성장률</h4>
<canvas id="chart-def"></canvas>
</div>

<div class="graph-card">
<h4>순발 성장률</h4>
<canvas id="chart-agi"></canvas>
</div>

<div class="graph-card">
<h4>총 성장률 (내구 제외)</h4>
<canvas id="chart-total"></canvas>
<div class="legend-box">휠로 확대/축소 가능</div>
</div>
</div>

<div class="footer">GitHub Pages 호환</div>

</div>

<script src="./pet.js"></script>
</body>
</html>
