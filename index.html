<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>⭐별과바다 계산기⭐</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

<style>
/* ===== 배경 ===== */
body{
    background: linear-gradient(180deg,#dff4ff,#eefaff,#f7fdff);
    min-height:100vh;
    font-family:'Malgun Gothic',sans-serif;
}

/* 중앙 카드 */
.main-wrapper{
    max-width:1000px;
    margin:30px auto;
}

/* 카드 스타일 */
.card{
    background:white;
    border-radius:18px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    padding:20px;
    margin-bottom:20px;
}

/* 제목 */
.site-title{
    text-align:center;
    margin-bottom:10px;
}
.site-title h2{
    font-weight:700;
    margin-bottom:0;
}
.site-title small{
    color:#4aa3d9;
    font-weight:bold;
}

/* 버튼 */
.btn-primary{
    background:#4fc3f7;
    border:none;
}
.btn-primary:hover{
    background:#29b6f6;
}

/* 추천 리스트 */
#pet-suggestions{
    list-style:none;
    padding:0;
    margin:0;
    background:white;
    border-radius:10px;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
    overflow:hidden;
}
#pet-suggestions li{
    padding:10px;
    cursor:pointer;
}
#pet-suggestions li:hover{
    background:#e3f6ff;
}

/* 결과 테이블 */
.table>tbody>tr>td{
    vertical-align:middle !important;
}

#btnTop{
    position:fixed;
    right:20px;
    bottom:20px;
    display:none;
    border:none;
    background:#4fc3f7;
    color:white;
    width:45px;
    height:45px;
    border-radius:50%;
    font-size:20px;
}
</style>
</head>

<body>

<div class="main-wrapper">

<div class="site-title">
    <h2>Happy Pet Calculator</h2>
    <small>⭐별과바다 부족⭐</small>
</div>

<div class="card">

<div class="form-group">
<label>페트 이름</label>
<div class="input-group">
<input type="text" class="form-control" id="name" placeholder="페트 이름 입력" autocomplete="off">
<span class="input-group-btn">
<button class="btn btn-primary" id="search">검색</button>
</span>
</div>
<div id="pet-suggestions-box" style="position:relative;">
<ul id="pet-suggestions"></ul>
</div>
</div>

<div class="row">
<div class="col-xs-6">
<label>내구력 (HP)</label>
<input type="number" id="hp" class="form-control">
</div>

<div class="col-xs-6">
<label>공격력 (ATK)</label>
<input type="number" id="atk" class="form-control">
</div>

<div class="col-xs-6">
<label>방어력 (DEF)</label>
<input type="number" id="def" class="form-control">
</div>

<div class="col-xs-6">
<label>순발력 (AGI)</label>
<input type="number" id="agi" class="form-control">
</div>
</div>

<br>
<button id="calculate" class="btn btn-primary btn-block btn-lg">
결과 계산하기
</button>

</div>

<div class="card" id="myPet" style="display:none;">
<table class="table table-bordered">
<thead>
<tr>
<th>구분</th>
<th>HP</th>
<th>ATK</th>
<th>DEF</th>
<th>AGI</th>
<th>합</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="card" id="result-master-container" style="display:none;">
<div id="result" class="table-responsive">
<table class="table table-striped">
<thead>
<tr>
<th>번호</th>
<th>등급</th>
<th>내구</th>
<th>공격</th>
<th>방어</th>
<th>순발</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

</div>

<button id="btnTop">▲</button>

<script src="pet.js"></script>

</body>
</html>
