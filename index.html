<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8">
<title>별과바다 부족 - 펫 계산기</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

<style>
body{
    background:linear-gradient(90deg,#0f1d1b,#142b28,#0f1d1b);
    color:#e8fdf5;
    font-family:'Malgun Gothic';
}

/* 3열 레이아웃 */
.main-wrap{
    display:grid;
    grid-template-columns:420px 1fr 420px;
    gap:40px;
    padding:40px;
    align-items:start;
}

.card{
    background:#1b1f1d;
    border-radius:18px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
    padding:20px;
}

/* 중앙 확률 */
#probabilityBox{
    text-align:center;
    margin-top:160px;
}

#probTitle{
    font-size:24px;
    margin-bottom:15px;
}

#probValue{
    font-size:42px;
    color:#27d36b;
    font-weight:bold;
}

/* 그래프 자리 */
#graphBox{
    text-align:center;
    margin-top:200px;
    color:#27d36b;
    font-size:20px;
}

/* 버튼 */
.btn-main{
    background:#4e5a54;
    border:none;
    height:50px;
    font-size:18px;
}
.btn-main:hover{
    background:#6a7771;
}
</style>

</head>

<body>

<div class="main-wrap">

<!-- 왼쪽 입력 -->

<div class="card">

<h3 style="text-align:center">Happy Pet Calculator</h3>
<p style="text-align:center;color:#ffd86b;">⭐별과바다 부족⭐</p>

<label>페트 이름</label>

<div class="input-group">
<span class="input-group-btn">
<button class="btn btn-default" id="showAll">▼</button>
</span>

<input type="text" class="form-control" id="name" autocomplete="off">

<span class="input-group-btn">
<button class="btn btn-info" id="search">검색</button>
</span>
</div>

<ul id="pet-suggestions"></ul>
<hr>

<div class="stat-row">
<label>내구</label>
<input type="number" id="hp" class="form-control">

<label>공격</label> <input type="number" id="atk" class="form-control">

<label>방어</label> <input type="number" id="def" class="form-control">

<label>순발</label> <input type="number" id="agi" class="form-control">

</div>

<br>
<button id="calculate" class="btn btn-main btn-block">결과 계산하기</button>

</div>

<!-- 중앙 확률 -->

<div id="probabilityBox">
<div id="probTitle">우수확률은 ?</div>
<div id="probValue">--%</div>
</div>

<!-- 오른쪽 그래프 자리 -->

<div id="graphBox">
우측에는 그래프 추가예정
</div>

</div>

<script>
var pet = [];
let btnName = "";
const result = [];

function loadPetData() {
    return $.getJSON('./pets.json?v=' + new Date().getTime())
        .done(function(data) { 
            pet = data;
            pet.sort((a,b)=>a.name.localeCompare(b.name,'ko'));
        });
}

$(document).ready(function() {

    loadPetData();

    $("#search, #calculate").on("click", function() {
        if (pet.length === 0) return;

        const foundPet = pet.find(p => p.name === $("#name").val());
        if (!foundPet) { alert("페트 정보를 찾을 수 없습니다."); return; }

        btnName = this.id;

        const copiedPet = JSON.parse(JSON.stringify(foundPet));
        setSRank(copiedPet);
        setBase(foundPet);
    });
});
</script>

<script src="pet.js"></script>

</body>
</html>
