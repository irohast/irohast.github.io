<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>별과바다 부족 펫 계산기</title>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="pet.js"></script>

<style>

body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(180deg,#dbeafe,#bfdbfe);
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    padding:40px 10px;
}

.wrapper{
    width:720px;
    max-width:95%;
    background:#344766;
    border-radius:26px;
    padding:30px 30px 40px 30px;
    box-shadow:0 20px 45px rgba(0,0,0,0.25);
    color:white;
}

.title{
    text-align:center;
    font-size:32px;
    font-weight:800;
    margin-bottom:5px;
}

.creator{
    text-align:center;
    color:#ff8fa3;
    font-weight:700;
    margin-bottom:25px;
}

.searchbox{
    display:flex;
    margin-bottom:20px;
    position:relative;
}

.searchbox input{
    flex:1;
    height:46px;
    border:none;
    border-radius:12px 0 0 12px;
    padding:0 12px;
    font-size:16px;
}

.searchbox button{
    width:90px;
    border:none;
    background:#55b6e6;
    color:#00314d;
    font-weight:bold;
    border-radius:0 12px 12px 0;
    cursor:pointer;
}

#suggest{
    position:absolute;
    top:46px;
    width:100%;
    background:white;
    color:black;
    border-radius:0 0 12px 12px;
    display:none;
    z-index:10;
}
#suggest div{
    padding:8px;
    cursor:pointer;
}
#suggest div:hover{
    background:#eee;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:15px;
}

.stat label{
    font-size:14px;
}

.stat input{
    width:100%;
    height:40px;
    border-radius:10px;
    border:none;
    padding-left:10px;
    font-size:15px;
}

.calcbtn{
    width:100%;
    height:50px;
    margin-top:22px;
    border:none;
    border-radius:14px;
    background:#4fc3ff;
    font-size:18px;
    font-weight:bold;
    color:#00213f;
    cursor:pointer;
}

#sbox{
    background:#f1f1f1;
    color:black;
    margin-top:22px;
    padding:15px;
    border-radius:14px;
    display:none;
}

table{
    width:100%;
    background:white;
    color:black;
    margin-top:20px;
    border-radius:12px;
    overflow:hidden;
}

th{
    background:#5bb7e2;
}

th,td{
    padding:8px;
    text-align:center;
}

/* ===== 성장 감정 박스 ===== */
#growthBox{
    margin-top:35px;
    background:#1f2c44;
    padding:20px;
    border-radius:16px;
}

#growthBox input{
    width:80px;
    height:32px;
    border-radius:8px;
    border:none;
    margin-left:5px;
    padding-left:5px;
}

#growthResult{
    margin-top:15px;
    font-size:16px;
    line-height:1.6;
}

.highlight{
    color:#4fc3ff;
    font-weight:bold;
}

.danger{
    color:#ff6b6b;
    font-weight:bold;
}

.good{
    color:#4ade80;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="title">⭐ 별과바다 부족 계산기 ⭐</div>
<div class="creator">제작 : 라프땅</div>

<div class="searchbox">
    <input type="text" id="name" placeholder="페트 이름 입력">
    <button id="search">검색</button>
    <div id="suggest"></div>
</div>

<div class="stats">
    <div class="stat"><label>HP</label><input id="hp" type="number"></div>
    <div class="stat"><label>ATK</label><input id="atk" type="number"></div>
    <div class="stat"><label>DEF</label><input id="def" type="number"></div>
    <div class="stat"><label>AGI</label><input id="agi" type="number"></div>
</div>

<button class="calcbtn" id="calculate">결과 계산하기</button>

<div id="sbox">
    <table id="myPet"><tbody></tbody></table>
</div>

<div id="result">
<table>
<thead>
<tr>
<th>순번</th>
<th>등급</th>
<th>HP</th>
<th>ATK</th>
<th>DEF</th>
<th>AGI</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<!-- ===================== 성장 감정 추가 ===================== -->

<div id="growthBox">

<h3>📈 육성 감정 (정밀 예측)</h3>

현재 레벨 :
<input type="number" id="curLevel">

<button id="growthCheck" class="calcbtn" style="height:40px;margin-top:15px">
8등급 판별 & 120예측
</button>

<div id="growthResult"></div>

</div>

</div>

<script>

var pet=[];
let btnName="";
const result=[];

function loadPetData(){
    $.getJSON("pets.json?v="+new Date().getTime(),function(data){
        pet=data;
    });
}

$("#name").on("input",function(){
    let val=$(this).val().toLowerCase();
    if(!val){$("#suggest").hide();return;}
    let list=pet.filter(p=>p.name.toLowerCase().includes(val)).slice(0,10);
    let html="";
    list.forEach(p=>html+="<div>"+p.name+"</div>");
    $("#suggest").html(html).show();
});

$(document).on("click","#suggest div",function(){
    $("#name").val($(this).text());
    $("#suggest").hide();
});

$("#search").click(function(){
    let found=pet.find(p=>p.name===$("#name").val());
    if(!found){alert("페트를 찾을 수 없습니다");return;}
    btnName="search";
    $("#sbox").show();
    setSRank(JSON.parse(JSON.stringify(found)));
});

$("#calculate").click(function(){
    let found=pet.find(p=>p.name===$("#name").val());
    if(!found){alert("페트를 찾을 수 없습니다");return;}
    btnName="calculate";
    setBase(found);
});

/* ===== 성장 감정 버튼 ===== */

$("#growthCheck").click(function(){

    let found=pet.find(p=>p.name===$("#name").val());
    if(!found){ alert("페트를 먼저 검색하세요"); return; }

    let level=parseInt($("#curLevel").val());
    if(!level || level<2){ alert("레벨은 2 이상 입력하세요"); return; }

    let nowStat={
        hp:parseFloat($("#hp").val()),
        atk:parseFloat($("#atk").val()),
        def:parseFloat($("#def").val()),
        agi:parseFloat($("#agi").val())
    };

    let res=estimateRankConfidence(found,level,nowStat);

    /* 120예측 */
    let predictedHP  = (nowStat.hp  + (120-level)*(nowStat.hp/level)).toFixed(1);
    let predictedATK = (nowStat.atk + (120-level)*(nowStat.atk/level)).toFixed(1);
    let predictedDEF = (nowStat.def + (120-level)*(nowStat.def/level)).toFixed(1);
    let predictedAGI = (nowStat.agi + (120-level)*(nowStat.agi/level)).toFixed(1);

    let colorClass="highlight";
    if(res.confidence>80) colorClass="good";
    if(res.confidence<40) colorClass="danger";

    $("#growthResult").html(
        "추정 B값 : <span class='highlight'>"+res.avgB+"</span><br>"+
        "8등급 확신도 : <span class='"+colorClass+"'>"+res.confidence+"%</span><br><br>"+
        "<b>📊 120레벨 예상 스탯</b><br>"+
        "HP : "+predictedHP+"<br>"+
        "ATK : "+predictedATK+"<br>"+
        "DEF : "+predictedDEF+"<br>"+
        "AGI : "+predictedAGI
    );

});

loadPetData();

</script>

</body>
</html>
