<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라프땅의 놀이터</title>

<link rel="stylesheet" href="dark.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>

<header class="top-header">
    <h1>라프땅의 놀이터</h1>
    <p class="subtitle">⭐ 별과바다 부족 전용 ⭐</p>
</header>

<main class="layout">

<section class="panel">

<h2>펫 계산기</h2>

<label>페트 선택</label>
<select id="pet-name"></select>

<div class="stat">
내구 <input id="hp" type="number">
공격 <input id="atk" type="number">
방어 <input id="def" type="number">
순발 <input id="agi" type="number">
</div>

<button id="run-btn">계산하기</button>

<div class="result-box">
<div id="rate">우수확률 : 대기중</div>
<div id="s-init"></div>
<div id="s-grow"></div>
</div>

<div class="top10">
<h3>가능 결과 TOP10</h3>
<div id="top10-list"></div>
</div>

</section>

</main>


<!-- ================= 엔진 영역 (절대 건드리지 말것) ================= -->
<div style="display:none">

<input id="name">

<div id="myPet"><table><tbody></tbody></table></div>
<div id="result"><table><tbody></tbody></table></div>
<div id="srank-label"></div>

<button id="search"></button>
<button id="calculate"></button>

<div id="result-master-container"></div>

</div>

<script>
var pet=[];
var btnName="";
var result=[];
</script>

<script src="pet.js"></script>
<script src="calc.js"></script>

</body>
</html>
